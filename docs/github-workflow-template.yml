# ================================================================
# 설치 방법:
#   GitHub 리포지토리 → Add file → Create new file
#   파일 경로: .github/workflows/collect-community-news.yml
#   이 파일 내용을 그대로 붙여넣기 → Commit changes
#
#   설치 후 Actions 탭 → Run workflow 로 수동 테스트 가능
# ================================================================

name: Collect Community News

on:
  schedule:
    # 매일 08:30 KST = 23:30 UTC (Claude Code Routine 30분 전)
    - cron: "30 23 * * *"
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write # data/daily-community.json 커밋 권한

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect community news (Reddit, HN, Simon Willison, hada.io)
        run: |
          mkdir -p data
          python scripts/collect_community_news.py

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily-community.json
          # 변경이 없으면 커밋 스킵
          git diff --staged --quiet || git commit -m "chore: daily community news data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
